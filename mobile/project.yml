name: HyperGit
# xcodegen spec — generates HyperGit.xcodeproj (iOS app target) from App/ sources
# and links the local HyperGitCore package (mobile/Package.swift).
# Regenerate after structural changes: `xcodegen generate` (run from mobile/).
options:
  bundleIdPrefix: ai.hypergit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  HyperGitCore:
    path: .

targets:
  HyperGit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: HyperGitCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hypergit.mobile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: HyperGit
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        ITSAppUsesNonExemptEncryption: false
