name: agent-tooling

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".agents/**"
      - ".haft/**"
      - ".opencode/**"
      - ".serena/**"
      - "opencode.json"
      - ".github/workflows/agent-tooling.yml"
  push:
    branches: ["**"]
    paths:
      - ".agents/**"
      - ".haft/**"
      - ".opencode/**"
      - ".serena/**"
      - "opencode.json"
      - ".github/workflows/agent-tooling.yml"

permissions:
  contents: read

jobs:
  shell:
    name: shell syntax
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Verify hosted runner dependencies
        run: |
          set -euo pipefail
          for cmd in git jq ruby sh sqlite3 swift; do
            command -v "$cmd"
          done
          swift --version
          sqlite3 --version

      - name: Reject mixed server/tooling changes
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          base="${PR_BASE_SHA:-$PUSH_BEFORE_SHA}"
          case "$base" in
            ""|0000000000000000000000000000000000000000)
              base=""
              if [ -n "${DEFAULT_BRANCH:-}" ]; then
                git fetch --no-tags --prune origin "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH" >/dev/null 2>&1 || true
                if git rev-parse --verify "origin/$DEFAULT_BRANCH^{commit}" >/dev/null 2>&1; then
                  base="$(git merge-base HEAD "origin/$DEFAULT_BRANCH" 2>/dev/null || true)"
                fi
              fi
              if [ -z "$base" ] && git rev-parse --verify "HEAD^" >/dev/null 2>&1; then
                base="$(git rev-parse HEAD^)"
              fi
              if [ -z "$base" ]; then
                base="$(git rev-list --max-parents=0 HEAD)"
              fi
              ;;
          esac
          changed_file="$(mktemp)"
          large_paths="$(mktemp)"
          trap 'rm -f "$changed_file" "$large_paths"' EXIT
          git diff --name-only "$base" HEAD >"$changed_file"
          n=1
          while [ "$n" -le 20000 ]; do
            printf 'docs/generated-%s.md\n' "$n"
            n=$((n + 1))
          done >"$large_paths"
          printf '%s\n' 'server/example.swift' '.haft/workflow.md' >>"$large_paths"
          # Regression canary: keep the large-input grep path exercised so the
          # mixed-change guard does not silently regress on long file lists.
          if ! grep -q '^server/' "$large_paths" || \
            ! grep -Eq '^(\.agents/|\.haft/|\.opencode/|\.serena/|opencode\.json$|\.github/workflows/agent-tooling\.yml$)' "$large_paths"; then
            echo "::error::mixed-change guard regression canary failed"
            exit 1
          fi

          if grep -q '^server/' "$changed_file" && \
            grep -Eq '^(\.agents/|\.haft/|\.opencode/|\.serena/|opencode\.json$|\.github/workflows/agent-tooling\.yml$)' "$changed_file"; then
            echo "::error::Do not mix server/** changes into the mobile/tooling bootstrap review path."
            cat "$changed_file"
            exit 1
          fi

      - name: Check shell scripts
        run: |
          set -euo pipefail
          for script in \
            .haft/bin/bootstrap-local-state \
            .haft/bin/install-codex-mcp \
            .haft/bin/serve-haft \
            .haft/bin/test-bootstrap-local-state
          do
            sh -n "$script"
          done

      - name: Smoke test MCP wrapper
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          printf '%s\n' '#!/usr/bin/env sh' '[ "${1:-}" = serve ] || exit 2' 'echo stub-haft-serve' >"$tmp/haft"
          chmod +x "$tmp/haft"
          PATH="$tmp:$PATH" .haft/bin/serve-haft >"$tmp/out"
          grep -q "stub-haft-serve" "$tmp/out"
          if HAFT_DB_PATH="$tmp/split.db" PATH="$tmp:$PATH" .haft/bin/serve-haft >"$tmp/guard.out" 2>"$tmp/guard.err"; then
            echo "expected serve-haft to reject HAFT_DB_PATH" >&2
            exit 1
          fi
          grep -q "HAFT_DB_PATH is not supported" "$tmp/guard.err"

      - name: Smoke test Codex MCP installer
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cat >"$tmp/codex" <<'SH'
          #!/usr/bin/env sh
          printf '%s\n' "$@" >"$CODEX_STUB_ARGS"
          SH
          chmod +x "$tmp/codex"

          CODEX_STUB_ARGS="$tmp/codex.args" \
            CODEX_HAFT_INSTALL_ROOT="$tmp/install" \
            PATH="$tmp:$PATH" \
            .haft/bin/install-codex-mcp >"$tmp/install.out"

          wrapper="$tmp/install/haft-gitapp/serve-haft"
          test -x "$wrapper"
          grep -q "$wrapper" "$tmp/codex.args"
          if grep -q '.haft/bin/serve-haft' "$tmp/codex.args"; then
            echo "installer must not register a mutable checkout script" >&2
            exit 1
          fi
          for bad_name in 'bad/name' '-help' '_hidden' '.hidden'; do
            if CODEX_HAFT_SERVER_NAME="$bad_name" CODEX_HAFT_INSTALL_ROOT="$tmp/install" PATH="$tmp:$PATH" .haft/bin/install-codex-mcp >/dev/null 2>"$tmp/bad-name.err"; then
              echo "expected installer to reject unsafe server name: $bad_name" >&2
              exit 1
            fi
            grep -q "safe slug" "$tmp/bad-name.err"
          done

      - name: Stub bootstrap integration
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          cat >"$tmp/swift" <<'SH'
          #!/usr/bin/env sh
          exit 0
          SH
          chmod +x "$tmp/swift"

          cat >"$tmp/haft" <<'SH'
          #!/usr/bin/env sh
          set -eu
          root="${HAFT_PROJECT_ROOT:-$(pwd)}"
          project_id="$(sed -n 's/^id:[[:space:]]*//p' "$root/.haft/project.yaml" | sed -n '1p')"
          db="$HOME/.haft/projects/$project_id/haft.db"
          marker="$HOME/.haft/projects/$project_id/evidence.ok"
          ensure_db() {
            mkdir -p "$(dirname "$db")"
            sqlite3 "$db" 'CREATE TABLE IF NOT EXISTS spec_section_baselines(id INTEGER); CREATE TABLE IF NOT EXISTS evidence_items(id INTEGER);'
          }
          case "${1:-}" in
            version)
              printf '%s\n' 'haft 7.0.0'
              printf '%s\n' '  commit:  a80902c'
              exit 0
              ;;
            sync)
              ensure_db
              exit 0
              ;;
            check)
              printf '%s\n' 'haft check: clean'
              exit 0
              ;;
            spec)
              case "${2:-}" in
                check)
                  printf '%s\n' 'haft spec check: clean'
                  exit 0
                  ;;
                coverage)
                  if [ "${3:-}" = --json ] && [ -f "$marker" ]; then
                    printf '%s\n' '{"sections":[],"gaps":[],"summary":{"total_sections":4,"state_counts":{"verified":4}}}'
                  elif [ "${3:-}" = --json ]; then
                    printf '%s\n' '{"sections":[],"gaps":[],"summary":{"total_sections":4,"state_counts":{"reasoned":4}}}'
                  else
                    exit 2
                  fi
                  exit 0
                  ;;
                onboard)
                  [ "${3:-}" = --json ] || exit 2
                  printf '%s\n' '{"phase":"stub.partial","terminal":false}'
                  exit 0
                  ;;
              esac
              ;;
            serve)
              ensure_db
              in="$(mktemp)"
              cat >"$in"
              if grep -q 'haft_spec_section' "$in"; then
                sqlite3 "$db" 'INSERT INTO spec_section_baselines DEFAULT VALUES;'
              fi
              if grep -q 'haft_decision' "$in"; then
                sqlite3 "$db" 'INSERT INTO evidence_items DEFAULT VALUES;'
                touch "$marker"
              fi
              rm -f "$in"
              printf '%s\n' '{"jsonrpc":"2.0","id":1,"result":{}}'
              exit 0
              ;;
          esac
          exit 2
          SH
          chmod +x "$tmp/haft"

          PATH="$tmp:$PATH" .haft/bin/test-bootstrap-local-state

      - name: Validate static carriers
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require "date"
          require "json"
          require "yaml"

          def fail!(message)
            abort("agent-tooling validation failed: #{message}")
          end

          def frontmatter(path)
            text = File.read(path)
            raw = text.match(/\A---\n(.*?)\n---\n/m)&.[](1)
            fail!("#{path} missing YAML frontmatter") unless raw
            YAML.safe_load(raw, permitted_classes: [Date, Time], aliases: false)
          end

          def file_like_ref?(entry)
            path = entry.split("#", 2).first
            path.include?("/") || path.match?(/\.(md|json|ya?ml|sh|swift|txt)\z/)
          end

          def markdown_anchors(path)
            counts = Hash.new(0)
            anchors = []
            File.readlines(path).each do |line|
              heading = line.match(/\A\#{1,6}[[:space:]]+(.+?)\s*\z/)&.[](1)
              next unless heading

              slug = heading.downcase
              slug.gsub!(/[[:space:]]+/, "-")
              slug.gsub!(/[^[:alnum:]-]/, "")
              count = counts[slug]
              counts[slug] += 1
              anchors << (count.zero? ? slug : "#{slug}-#{count}")
            end
            anchors
          end

          opencode = JSON.parse(File.read("opencode.json"))
          haft = opencode.dig("mcp", "haft")
          fail!("opencode.json missing mcp.haft") unless haft
          fail!("mcp.haft.enabled must be false in checked-in config") unless haft["enabled"] == false
          fail!("mcp.haft.type must be local") unless haft["type"] == "local"
          fail!("mcp.haft.command must be .haft/bin/serve-haft") unless haft["command"] == [".haft/bin/serve-haft"]

          project = YAML.safe_load(File.read(".haft/project.yaml"), permitted_classes: [], aliases: false)
          project_id = project["id"].to_s
          fail!(".haft/project.yaml id must be a safe slug") unless project_id.match?(/\A[A-Za-z0-9][A-Za-z0-9._-]*\z/) && !project_id.include?("..")

          serena = YAML.safe_load(File.read(".serena/project.yml"), permitted_classes: [], aliases: false)
          fail!("Serena project_name must be gitapp") unless serena["project_name"] == "gitapp"
          fail!("Serena languages must include swift") unless serena["languages"].is_a?(Array) && serena["languages"].include?("swift")
          fail!("Serena must not be read-only for agent editing") unless serena["read_only"] == false

          skills = Dir[".agents/skills/h-*/SKILL.md"]
          fail!("no h-* skills found") if skills.empty?
          skills.each do |path|
            data = frontmatter(path)
            fail!("#{path} missing name") unless data["name"].to_s.start_with?("h-")
            fail!("#{path} missing description") if data["description"].to_s.empty?
            policy_path = File.join(File.dirname(path), "agents", "openai.yaml")
            fail!("#{policy_path} missing") unless File.file?(policy_path)
            policy = YAML.safe_load(File.read(policy_path), permitted_classes: [], aliases: false)
            fail!("#{policy_path} must disable implicit invocation") unless policy.dig("policy", "allow_implicit_invocation") == false
          end
          commands = Dir[".opencode/commands/h-*.md"]
          fail!("no h-* OpenCode commands found") if commands.empty?
          commands.each do |path|
            data = frontmatter(path)
            fail!("#{path} missing description") if data["description"].to_s.empty?
            skill_name = File.basename(path, ".md")
            skill_path = ".agents/skills/#{skill_name}/SKILL.md"
            fail!("#{path} must have matching #{skill_path}") unless File.file?(skill_path)
          end

          spec_files = [".haft/specs/target-system.md", ".haft/specs/enabling-system.md"]
          required = %w[id kind title statement_type claim_layer owner status depends_on supersedes terms target_refs evidence_required]
          evidence_kinds = %w[type L1 L2 L3 L4 DB E2E manual]
          active_section_ids = []
          normative_target_refs = []
          spec_files.each do |path|
            text = File.read(path)
            blocks = text.scan(/```yaml spec-section\n(.*?)\n```/m).flatten
            fail!("#{path} has no spec-section blocks") if blocks.empty?
            blocks.each do |block|
              data = YAML.safe_load(block, permitted_classes: [Date], aliases: false)
              missing = required.reject { |key| data.key?(key) }
              fail!("#{path} section #{data["id"] || "(unknown)"} missing #{missing.join(", ")}") unless missing.empty?
              evidence_required = data["evidence_required"]
              fail!("#{path} section #{data["id"]} evidence_required must be an array") unless evidence_required.is_a?(Array)
              target_refs = data["target_refs"]
              fail!("#{path} section #{data["id"]} target_refs must be an array") unless target_refs.is_a?(Array)
              target_refs.each do |entry|
                fail!("#{path} section #{data["id"]} target_refs entries must be non-empty strings") unless entry.is_a?(String) && !entry.empty?
                fail!("#{path} section #{data["id"]} target_refs entry has invalid format") unless entry.match?(/\A[A-Za-z0-9._\/#-]+\z/)
                if file_like_ref?(entry)
                  ref_path, ref_anchor = entry.split("#", 2)
                  fail!("#{path} section #{data["id"]} target_refs file does not exist: #{ref_path}") unless File.file?(ref_path)
                  if ref_anchor && !markdown_anchors(ref_path).include?(ref_anchor)
                    fail!("#{path} section #{data["id"]} target_refs anchor does not exist: #{entry}")
                  end
                else
                  normative_target_refs << entry
                end
              end
              evidence_required.each do |entry|
                fail!("#{path} section #{data["id"]} evidence_required entries must be objects") unless entry.is_a?(Hash)
                fail!("#{path} section #{data["id"]} evidence_required entry missing ref") if entry["ref"].to_s.empty?
                fail!("#{path} section #{data["id"]} evidence_required entry missing description") if entry["description"].to_s.empty?
                fail!("#{path} section #{data["id"]} evidence_required kind is invalid") unless evidence_kinds.include?(entry["kind"])
                if entry["kind"] != "manual"
                  fail!("#{path} section #{data["id"]} non-manual evidence_required entry missing command") if entry["command"].to_s.empty?
                end
              end
              if data["status"] == "active"
                fail!("#{path} section #{data["id"]} active valid_until must be a date") unless data["valid_until"].is_a?(Date)
                active_section_ids << data["id"]
              end
            end
          end
          fail!("expected at least one active spec section") if active_section_ids.empty?

          term_text = File.read(".haft/specs/term-map.md")
          term_block = term_text.match(/```yaml term-map\n(.*?)\n```/m)&.[](1)
          fail!("term-map carrier missing") unless term_block
          term_map = YAML.safe_load(term_block, permitted_classes: [], aliases: false)
          fail!("term-map entries missing") unless term_map["entries"].is_a?(Array) && !term_map["entries"].empty?
          term_names = term_map["entries"].map do |entry|
            fail!("term-map entries must be objects") unless entry.is_a?(Hash)
            term = entry["term"].to_s
            fail!("term-map entry missing term") if term.empty?
            fail!("term-map entry missing definition: #{term}") if entry["definition"].to_s.empty?
            term
          end
          aliases = term_map["target_ref_aliases"]
          fail!("term-map target_ref_aliases missing") unless aliases.is_a?(Array) && !aliases.empty?
          alias_ids = aliases.map do |entry|
            fail!("term-map target_ref_aliases entries must be objects") unless entry.is_a?(Hash)
            id = entry["id"].to_s
            fail!("term-map target_ref_aliases entries must name id") if id.empty?
            fail!("term-map target_ref_aliases id has invalid format: #{id}") unless id.match?(/\A[A-Za-z][A-Za-z0-9]*(?:\.[A-Za-z0-9_-]+){2,}\z/)
            fail!("term-map target_ref_aliases entry missing definition: #{id}") if entry["definition"].to_s.empty?
            id
          end
          undefined_refs = normative_target_refs.uniq - alias_ids
          fail!("target_refs aliases missing from term-map: #{undefined_refs.join(", ")}") unless undefined_refs.empty?

          decision_statuses = %w[active superseded deprecated expired cancelled archived]
          evidence_statuses = %w[active superseded deprecated expired cancelled archived]

          decisions = Dir[".haft/decisions/*.md"].map { |path| [path, frontmatter(path)] }
          fail!("expected active DecisionRecord carriers") if decisions.empty?
          decision_ids = decisions.map { |_path, data| data["id"] }
          decisions.each do |path, data|
            required_decision = %w[id kind title status valid_until links]
            missing = required_decision.reject { |key| data.key?(key) }
            fail!("#{path} missing #{missing.join(", ")}") unless missing.empty?
            fail!("#{path} kind must be DecisionRecord") unless data["kind"] == "DecisionRecord"
            fail!("#{path} status is invalid") unless decision_statuses.include?(data["status"])
            next unless data["status"] == "active"
            %w[selected_title why_selected selection_policy counterargument weakest_link].each do |key|
              fail!("#{path} #{key} must be non-empty") if data[key].to_s.empty?
            end
            fail!("#{path} why_not_others missing") unless data["why_not_others"].is_a?(Array) && !data["why_not_others"].empty?
            data["why_not_others"].each do |entry|
              fail!("#{path} why_not_others entries must name title and reason") unless entry.is_a?(Hash) && !entry["title"].to_s.empty? && !entry["reason"].to_s.empty?
            end
            fail!("#{path} refresh_triggers missing") unless data["refresh_triggers"].is_a?(Array) && !data["refresh_triggers"].empty?
            fail!("#{path} affected_files missing") unless data["affected_files"].is_a?(Array) && !data["affected_files"].empty?
            data["affected_files"].each do |entry|
              fail!("#{path} affected_files entries must be non-empty strings") unless entry.is_a?(String) && !entry.empty?
              fail!("#{path} affected_files must not include server scope") if entry == "server/**" || entry.start_with?("server/")
              matches = entry.include?("*") ? Dir.glob(entry, File::FNM_DOTMATCH).reject { |candidate| candidate.end_with?("/.") || candidate.end_with?("/..") } : [entry].select { |candidate| File.exist?(candidate) }
              fail!("#{path} affected_files entry does not resolve: #{entry}") if matches.empty?
            end
            fail!("#{path} evidence_requirements missing") unless data["evidence_requirements"].is_a?(Array) && !data["evidence_requirements"].empty?
          end

          evidence = Dir[".haft/evidence/*.md"].map { |path| [path, frontmatter(path)] }
          fail!("expected active EvidencePack carriers") if evidence.empty?
          evidence.each do |path, data|
            required_evidence = %w[id kind title status artifact_ref evidence_type evidence_verdict carrier_ref claim_scope valid_until links]
            missing = required_evidence.reject { |key| data.key?(key) }
            fail!("#{path} missing #{missing.join(", ")}") unless missing.empty?
            fail!("#{path} kind must be EvidencePack") unless data["kind"] == "EvidencePack"
            fail!("#{path} status is invalid") unless evidence_statuses.include?(data["status"])
            fail!("#{path} artifact_ref must reference a DecisionRecord") unless decision_ids.include?(data["artifact_ref"])
            next unless data["status"] == "active"
            scope = data["claim_scope"]
            fail!("#{path} claim_scope missing") unless scope.is_a?(Array) && !scope.empty?
            covered_sections = scope & active_section_ids
            fail!("#{path} claim_scope must cover an active spec section") if covered_sections.empty?
            unknown_scope_terms = scope - active_section_ids - term_names
            fail!("#{path} claim_scope has unknown terms: #{unknown_scope_terms.join(", ")}") unless unknown_scope_terms.empty?
          end

          payload_files = Dir[".haft/bootstrap/*.jsonl"].sort
          fail!("bootstrap JSON-RPC payload files missing") if payload_files.empty?
          payloads = []
          payload_files.each do |payload_path|
            File.readlines(payload_path).each_with_index do |line, index|
              line = line.strip
              next if line.empty?
              payloads << JSON.parse(line)
            rescue JSON::ParserError => error
              fail!("#{payload_path}:#{index + 1} has invalid JSON-RPC payload: #{error.message}")
            end
          end
          fail!("bootstrap JSON-RPC payloads missing") if payloads.empty?
          payloads.each do |payload|
            next unless payload["method"] == "tools/call"
            params = payload["params"]
            fail!("bootstrap tool call missing params") unless params.is_a?(Hash)
            name = params["name"]
            args = params["arguments"]
            fail!("bootstrap tool call missing arguments") unless args.is_a?(Hash)
            case name
            when "haft_spec_section"
              fail!("haft_spec_section action invalid") unless %w[approve rebaseline].include?(args["action"])
              fail!("haft_spec_section section_id must reference an active section") unless active_section_ids.include?(args["section_id"])
              if args["action"] == "approve"
                fail!("haft_spec_section approve missing approved_by") if args["approved_by"].to_s.empty?
              else
                fail!("haft_spec_section rebaseline missing reason") if args["reason"].to_s.empty?
              end
            when "haft_decision"
              fail!("haft_decision bootstrap action must be evidence") unless args["action"] == "evidence"
              fail!("haft_decision artifact_ref must reference a DecisionRecord") unless decision_ids.include?(args["artifact_ref"])
              scope = args["claim_scope"]
              fail!("haft_decision claim_scope must cover an active section") unless scope.is_a?(Array) && !(scope & active_section_ids).empty?
              unknown_scope_terms = scope - active_section_ids - term_names
              fail!("haft_decision claim_scope has unknown terms: #{unknown_scope_terms.join(", ")}") unless unknown_scope_terms.empty?
            else
              fail!("unexpected bootstrap MCP tool #{name.inspect}")
            end
          end
          RUBY

  bootstrap:
    name: real Haft bootstrap integration
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: [self-hosted, macOS, haft]
    needs: shell
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install public CLI dependencies
        run: |
          set -euo pipefail
          brew install jq

      - name: Require pinned Haft CLI
        run: |
          set -euo pipefail
          if ! command -v haft >/dev/null 2>&1; then
            echo "::error::haft 7.0.0 (commit a80902c) must be installed on this runner before agent-tooling CI can pass."
            exit 1
          fi
          version="$(haft version)"
          printf '%s\n' "$version"
          printf '%s\n' "$version" | grep -Eq '^haft 7\.0\.0$'
          printf '%s\n' "$version" | grep -Eq 'commit:[[:space:]]+a80902c$'

      - name: Reject automated Haft rebaseline
        run: |
          set -euo pipefail
          if [ -n "${HAFT_BOOTSTRAP_REBASELINE+x}" ] || [ -n "${HAFT_BOOTSTRAP_REBASELINE_REASON+x}" ]; then
            echo "::error::HAFT_BOOTSTRAP_REBASELINE* must not be set in automated CI."
            exit 1
          fi

      - name: Run bootstrap integration
        run: |
          set -euo pipefail
          .haft/bin/test-bootstrap-local-state
