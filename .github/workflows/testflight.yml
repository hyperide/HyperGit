# TestFlight CI — builds a signed .ipa and uploads it to App Store Connect.
#
# WHY GATED: uploading to TestFlight requires a paid Apple Developer account, an App
# Store Connect app, and signing material (distribution certificate + provisioning
# profile + an App Store Connect API key). None of that can be created autonomously.
# The whole job is gated on the repo variable ENABLE_TESTFLIGHT == 'true' so the
# workflow stays green until you provision the secrets. Setup: docs/testflight.md.
#
# SIGNING: manual signing. The distribution .p12 is imported into a temporary keychain
# (apple-actions/import-codesign-certs), the .mobileprovision is installed by UUID, and
# xcodebuild -exportArchive uses an app-store ExportOptions.plist.
#
# UPLOAD: xcrun altool with the App Store Connect API key (no Ruby/fastlane dependency).
# altool is deprecated by Apple but remains the standard non-Ruby upload path on CI.
#
# TRIGGERS: on tag push (v*) and manual workflow_dispatch.

name: testflight

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    name: Build signed .ipa and upload to TestFlight
    if: ${{ vars.ENABLE_TESTFLIGHT == 'true' }}
    runs-on: macos-latest
    env:
      BUNDLE_ID: ai.hypergit.mobile
      SCHEME: HyperGit
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Show toolchain
        run: |
          set -euo pipefail
          xcrun xcodebuild -version
          swift --version

      - name: Install xcodegen and generate project
        run: |
          set -euo pipefail
          brew install xcodegen
          (cd mobile && xcodegen generate)

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.BUILD_CERTIFICATE_P12_PASSWORD }}

      - name: Install provisioning profile
        run: |
          set -euo pipefail
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 -d \
            -o "~/Library/MobileDevice/Provisioning Profiles/${{ secrets.PROVISIONING_PROFILE_UUID }}.mobileprovision"

      - name: Write ExportOptions.plist
        working-directory: mobile
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <dict>
                <key>name</key><string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
              </dict>
            </dict>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF

      - name: Archive (Release, signed)
        working-directory: mobile
        run: |
          set -euo pipefail
          xcodebuild -project HyperGit.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/HyperGit.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            archive

      - name: Export signed .ipa
        working-directory: mobile
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath build/HyperGit.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist
          ls -lh build/ipa

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo "${{ secrets.ASC_API_KEY_PRIVATE_KEY }}" > "private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8"

      - name: Validate .ipa
        working-directory: mobile
        run: |
          set -euo pipefail
          IPA=$(find build/ipa -name '*.ipa' | head -1)
          xcrun altool --validate-app --type ios --file "$IPA" \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_API_KEY_ISSUER_ID }}"

      - name: Upload to TestFlight
        working-directory: mobile
        run: |
          set -euo pipefail
          IPA=$(find build/ipa -name '*.ipa' | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_API_KEY_ISSUER_ID }}"
          echo "Uploaded $IPA to App Store Connect. Beta details/notes are set in App Store Connect."
